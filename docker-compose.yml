services:
  app:
    build: ./docker/php
    container_name: alacarte-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: alacarte-db
    environment:
      MYSQL_DATABASE: alacarte
      MYSQL_USER: alacarte
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: alacarte-pma
    environment:
      PMA_HOST: db
      PMA_USER: alacarte
      PMA_PASSWORD: secret
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db-data:
